spring.application.name=registration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=csdlpt;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# JWT (thay secret bằng base64-encoded key 256-bit trong production)
jwt.secret=c2VjcmV0LWtleS1mb3ItaG1hYy1zaGEyNTYtYWxnb3JpdGhtLWRldg==
jwt.access-token-expiration-ms=900000
jwt.refresh-token-expiration-ms=604800000

# Default LOCAL_ADMIN (ghi đè trong production)
app.default-admin.username=localadmin
app.default-admin.password=Admin@123456